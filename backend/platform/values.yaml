project:
  group: sedemo-team-eddie

image:
  # If using default workflow, this will be set to ghcr.io/<github_org>/<repo_name>
  repository: ghcr.io/akuity/sedemo-app-monorepo-backend
  # Default use of this ghcr publishing workflow will use incrmental build number as tag
  selectionStrategy: Lexical
  tagRegex: ^v.*$
  containerPort: 80
  memoryLimit: 64Mi
  cpuLimit: 1m
ingress:
  custom_prefix: backend

rollouts:
  enabled: true

environments:
  staging: true
